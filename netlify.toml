[build]
  publish = "dist"
  command = "npm run build && (npx playwright install chromium > /dev/null 2>&1 && node scripts/prerender.mjs || echo '[prerender] skipped on this build')"

[[headers]]
  for = "/"
  [headers.values]
    Link = "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\", </sitemap.xml>; rel=\"describedby\"; type=\"application/xml\", </help>; rel=\"service-doc\"; type=\"text/html\""

[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type = "application/linkset+json; profile=\"https://www.rfc-editor.org/info/rfc9727\""
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/auth.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(), payment=(self)"
    X-DNS-Prefetch-Control = "on"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
