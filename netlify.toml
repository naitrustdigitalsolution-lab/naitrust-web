[build]
  publish = "dist"
  command = "npm run build"

[[headers]]
  for = "/"
  [headers.values]
    Link = "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\", </sitemap.xml>; rel=\"describedby\"; type=\"application/xml\", </help>; rel=\"service-doc\"; type=\"text/html\""

[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type = "application/linkset+json"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/auth.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"

[[redirects]]
  from = "/api/public-submissions"
  to = "/.netlify/functions/public-submissions"
  status = 200

[[redirects]]
  from = "/api/waitlist"
  to = "/.netlify/functions/waitlist"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
