<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e90ff" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta
      name="description"
      content="Naitrust is trust infrastructure for Nigerian property transactions — a structured record of participants, agreements, payments, documents, and milestones from deal to completion."
    />
    <title>Naitrust | Trust Infrastructure for Property Transactions</title>
    <link rel="canonical" href="https://naitrust.com/" />

    <!-- Open Graph (defaults for link previews; per-page tags injected at runtime) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Naitrust" />
    <meta property="og:title" content="Naitrust | Trust Infrastructure for Property Transactions" />
    <meta
      property="og:description"
      content="Naitrust creates one clear record for Nigerian property transactions — who is involved, what was agreed, what payments and documents exist, and what happens next."
    />
    <meta property="og:url" content="https://naitrust.com/" />
    <meta property="og:image" content="https://naitrust.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Naitrust | Trust Infrastructure for Property Transactions" />
    <meta
      name="twitter:description"
      content="A structured record for Nigerian property transactions — agreements, payments, documents, and milestones in one place."
    />
    <meta name="twitter:image" content="https://naitrust.com/og-image.png" />
    <meta name="twitter:site" content="@naitrust14419" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_NG" />

    <!-- Structured data: who Naitrust is, so Google/Bing/AI search surfaces the
         right facts (brand, contact, social profiles) when "Naitrust" is searched. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "@id": "https://naitrust.com/#organization",
        "name": "Naitrust",
        "legalName": "Naitrust Digital Solutions Limited",
        "alternateName": ["Naitrust Digital Solutions", "NaiTrust"],
        "url": "https://naitrust.com/",
        "logo": "https://naitrust.com/icon-512.png",
        "image": "https://naitrust.com/og-image.png",
        "description": "Naitrust is trust infrastructure for Nigerian property transactions — a structured, secure record of participants, agreements, payments, documents, and milestones from agreement to completion.",
        "email": "contact@naitrust.com",
        "telephone": "+234-707-587-3258",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Lagos",
          "addressCountry": "NG"
        },
        "areaServed": {
          "@type": "Country",
          "name": "Nigeria"
        },
        "knowsAbout": [
          "Property transactions",
          "Real estate trust infrastructure",
          "Escrow alternative",
          "Fintech",
          "Trust infrastructure",
          "Identity verification",
          "Payment protection",
          "Real estate technology Nigeria"
        ],
        "sameAs": [
          "https://instagram.com/naitrust_digitalsolutions",
          "https://x.com/naitrust14419",
          "https://www.linkedin.com/in/naitrust-digital-solutions"
        ],
        "contactPoint": [
          {
            "@type": "ContactPoint",
            "contactType": "customer support",
            "email": "contact@naitrust.com",
            "telephone": "+234-707-587-3258",
            "areaServed": "NG",
            "availableLanguage": ["English"]
          }
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "@id": "https://naitrust.com/#website",
        "url": "https://naitrust.com/",
        "name": "Naitrust",
        "description": "Trust infrastructure for Nigerian property transactions — secure, verifiable records for buyers, sellers, agents, developers, and real estate companies.",
        "publisher": { "@id": "https://naitrust.com/#organization" },
        "inLanguage": "en-NG"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Service",
        "serviceType": "Property transaction trust infrastructure",
        "provider": { "@id": "https://naitrust.com/#organization" },
        "areaServed": {
          "@type": "Country",
          "name": "Nigeria"
        },
        "audience": [
          { "@type": "Audience", "audienceType": "Property buyers" },
          { "@type": "Audience", "audienceType": "Property sellers" },
          { "@type": "Audience", "audienceType": "Real estate agents" },
          { "@type": "Audience", "audienceType": "Property developers" },
          { "@type": "Audience", "audienceType": "Real estate companies" }
        ],
        "description": "A secure, verifiable transaction record for Nigerian property deals — participant verification, documented agreements, protected payments through regulated financial partners, and milestone evidence from agreement to completion.",
        "category": ["Real Estate", "Fintech", "Trust Infrastructure", "Escrow Alternative", "Property Technology"]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.2/build/spline-viewer.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
